# Railway deployment config - Node.js + Python (for PDF OCR)
providers = ["node", "python"]

[phases.setup]
nixPkgs = ["pkgs.nodejs-20_x", "pkgs.python311", "pkgs.tesseract", "pkgs.tesseract4.langdata.chi_tra", "pkgs.tesseract4.langdata.chi_sim"]

[phases.install]
cmds = ["npm install", "pip install pymupdf pytesseract Pillow"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "NODE_ENV=production node dist/index.cjs"
